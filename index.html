<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RyanCxeven | Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#000;
    color:#fff;
    overflow-x:hidden;
}

/* Video Background */
.video-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
    z-index:-1;
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 10%;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#00bfff;
    text-shadow:0 0 15px #00bfff;
}

nav ul{
    display:flex;
    list-style:none;
    gap:30px;
}

nav a{
    color:white;
    text-decoration:none;
    transition:0.3s;
}

nav a:hover{
    color:#00bfff;
}

/* Hero Section */
.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
    padding:20px;
}

.hero h1{
    font-size:70px;
    color:#00bfff;
    text-shadow:0 0 25px #00bfff;
}

.hero p{
    margin-top:15px;
    font-size:20px;
    color:#ccc;
}

.btn{
    margin-top:30px;
    padding:15px 40px;
    border:2px solid #00bfff;
    color:#00bfff;
    text-decoration:none;
    border-radius:40px;
    transition:0.4s;
}

.btn:hover{
    background:#00bfff;
    color:black;
    box-shadow:0 0 25px #00bfff;
}

/* Sections */
section{
    padding:100px 10%;
}

.section-title{
    color:#00bfff;
    margin-bottom:30px;
    font-size:40px;
    text-align:center;
}

/* About */
.about-box{
    background:rgba(0,0,0,0.6);
    border:1px solid #00bfff;
    border-radius:15px;
    padding:40px;
    backdrop-filter:blur(10px);
}

/* Skills */
.skills{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.skill{
    background:rgba(0,0,0,0.6);
    border:1px solid #00bfff;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

/* Footer */
footer{
    text-align:center;
    padding:30px;
    background:black;
    border-top:1px solid #00bfff;
}

.author{
    color:#00bfff;
}

@media(max-width:768px){

.hero h1{
    font-size:45px;
}

nav{
    flex-direction:column;
    gap:20px;
}
}
</style>

</head>
<body>

<!-- Background Video -->
<video autoplay muted loop class="video-bg">
    <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- Navbar -->
<nav>
    <div class="logo">RyanCxeven</div>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<!-- Hero -->
<section class="hero">

    <h1>RYANCXEVEN</h1>

    <p>
        Welcome To My Digital Realm
    </p>

    <a href="#about" class="btn">Explore</a>

</section>

<!-- About -->
<section id="about">

    <h2 class="section-title">About Me</h2>

    <div class="about-box">

        <p>
            [ABOUT ME TEXT YAHAN LIKHNA]
        </p>

    </div>

</section>

<!-- Skills -->
<section id="skills">

<h2 class="section-title">Skills</h2>

<div class="skills">

<div class="skill">
<h3>Web Development</h3>
</div>

<div class="skill">
<h3>Cyber Security</h3>
</div>

<div class="skill">
<h3>Programming</h3>
</div>

<div class="skill">
<h3>UI / UX Design</h3>
</div>

</div>

</section>

<!-- Contact -->
<section id="contact">

<h2 class="section-title">Contact</h2>

<div class="about-box">
Email: your@email.com
<br><br>
Discord: RyanCxeven
</div>

</section>

<footer>
    Designed By
    <span class="author">RyanCxeven</span>
</footer>

</body>
</html>
